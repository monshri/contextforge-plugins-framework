[template]
cargo_generate_version = ">=0.18.0"
description = "CPEX sandboxed WASM plugin component"

[placeholders.authors]
type = "string"
prompt = "Author name"
default = "Your Name <you@example.com>"

[placeholders.description]
type = "string"
prompt = "Plugin description"
default = "A CPEX plugin running in a WASM sandbox"
