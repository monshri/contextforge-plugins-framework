# =====================================================================
# sampleWasmPlugin — CPEX WASM Plugin Manifest
# =====================================================================
# This file is the deployment contract for a WebAssembly Component Model
# plugin. The CPEX framework loads this YAML, verifies the .wasm artifact,
# links only the capabilities declared here, and instantiates the
# component in a sandbox.
#
# Spec: docs/specs/wasm-plugin-spec.md
# Schema: docs/specs/wasm-plugin-manifest.schema.json
# =====================================================================

api_version: "cpex.plugin/v1"

name: "samplewasmplugin"
version: "0.1.0"
description: "A WebAssembly Component Model plugin for CPEX"
author: "Shriti"
license: "Apache-2.0"

# ---------------------------------------------------------------------
# The .wasm Component Model artifact
# ---------------------------------------------------------------------
# After `make build` runs, run `make manifest-sha` to fill in the sha256.
# The host refuses to load if the on-disk file does not match this hash.
artifact:
  path: "./build/samplewasmplugin.wasm"
  sha256: "3325f72db6212ba35c7b629975060eed0191d15286453adc3f6b257c35be1d21"
  # Optional: detached cosign signature
  # signature: "./build/samplewasmplugin.wasm.sig"
  # signature_format: "cosign"
  # public_key: "./keys/cosign.pub"

# ---------------------------------------------------------------------
# Hooks this plugin handles
# ---------------------------------------------------------------------
# Must match the names registered in the host's HookRegistry. Built-in
# hooks include: prompt_pre_fetch, prompt_post_fetch, tool_pre_invoke,
# tool_post_invoke, resource_pre_fetch, resource_post_fetch,
# agent_pre_invoke, agent_post_invoke.
hooks:
  - tool_pre_invoke
  - tool_post_invoke

# ---------------------------------------------------------------------
# Capabilities — the security boundary
# ---------------------------------------------------------------------
# Only the capabilities listed here are linked into the wasm instance.
# Anything else, the plugin physically cannot call. Default to the
# smallest set possible.
#
# Available:
#   log                                  always granted, listed for docs
#   clock                                always granted, listed for docs
#   random                               cryptographic randomness
#   kv:read / kv:write                   per-plugin private namespace
#   http:fetch                           unrestricted outbound (discouraged)
#   http:fetch:HOST[:PORT]               scoped outbound; repeat as needed
#   filesystem:read:/abs/path            WASI preopened read-only
#   filesystem:write:/abs/path           WASI preopened read-write
capabilities:
  - log
  - clock

# ---------------------------------------------------------------------
# Resource limits per invocation
# ---------------------------------------------------------------------
# The runtime enforces these. The host MAY tighten but MUST NOT loosen
# these via deployment policy.
limits:
  max_memory_mb: 64
  max_fuel: 100000000        # ~CPU budget per invoke-hook call
  call_timeout_ms: 5000      # wall-clock deadline per call
  max_table_elements: 10000
  max_payload_bytes: 1048576 # 1 MiB JSON payload cap

# ---------------------------------------------------------------------
# Plugin config schema (optional)
# ---------------------------------------------------------------------
# JSON Schema applied to the `config` dict before it is passed to the
# component's init(). If validation fails the plugin will not load.
config_schema:
  type: object
  properties:
    blocked_tools:
      type: array
      items:
        type: string
      default: []
  additionalProperties: false

# ---------------------------------------------------------------------
# Free-form metadata (ignored by the runtime)
# ---------------------------------------------------------------------
metadata:
  tags: ["example", "wasm"]
  source_language: "rust"
  build_command: "make build"
